<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой план обучения — трекер прогресса</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .header {
            background: linear-gradient(135deg, #1e2a3a, #0f1724);
            padding: 1.8rem 2rem;
            color: white;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1:before {
            content: "📘";
            font-size: 1.9rem;
        }

        .sub {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stats-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem 1.2rem;
            background-color: #f8fafc;
            color: #1e293b;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
            transition: background 0.2s;
        }

        tr:hover td {
            background-color: #fef9e6;
        }

        .completed {
            background-color: #f0f9f0;
        }

        .completed a {
            text-decoration: line-through;
            color: #6c757d;
            opacity: 0.75;
        }

        a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }

        a:after {
            content: "↗";
            font-size: 0.8rem;
            opacity: 0.6;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #2b6e3c;
            transform: scale(1);
            margin-right: 4px;
        }

        .footer-note {
            background: #f1f5f9;
            padding: 0.8rem 1.5rem;
            font-size: 0.75rem;
            color: #334155;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: normal;
            background: #e6f0ff;
            padding: 4px 12px;
            border-radius: 50px;
            color: #1e40af;
        }

        .btn-reset {
            background: none;
            border: none;
            color: #4b5563;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.2s;
        }

        .btn-reset:hover {
            background: #e2e8f0;
            color: #0f1724;
        }

        @media (max-width: 550px) {
            .header h1 { font-size: 1.5rem; }
            th, td { padding: 0.8rem 0.8rem; }
            .header { padding: 1.2rem 1rem; }
        }

        .empty-row td {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Мой план обучения</h1>
        <div class="sub">
            <span>📌 Отмечайте пройденные материалы — прогресс сохраняется</span>
            <span class="stats-badge" id="progressStats">0 / 0 завершено</span>
        </div>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px">Статус</th>
                    <th>Название</th>
                </tr>
            </thead>
            <tbody id="links-table-body">
                <tr class="empty-row"><td colspan="2">⏳ Загрузка учебных материалов...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="footer-note">
        <span>✅ Нажмите на чекбокс — ссылка зачеркнётся и статус сохранится в Firebase</span>
        <button class="btn-reset" id="demoResetBtn" style="display: none;">🔄 Сбросить все отметки (демо)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ======================== КОНФИГУРАЦИЯ FIREBASE ========================
    // 🔥 ВАЖНО: Замените эти данные на реальные из вашего проекта Firebase!
    // Если вы хотите просто протестировать внешний вид и логику с примерами,
    // можно временно использовать режим "демо" (но в реальном проекте укажите свои ключи).
    // Ниже представлены ПРИМЕРНЫЕ значения — их нужно заменить на ваши.
    const firebaseConfig = {
        apiKey: "AIzaSyBYmca3nKbyB0e3VpCvFJZ3KsDSz8a1nKs",
        authDomain: "selflearn-462ff.firebaseapp.com",
        projectId: "selflearn-462ff",
        storageBucket: "selflearn-462ff.appspot.com",
        messagingSenderId: "530046188190",
        appId: "1:530046188190:web:4f1f5ceb63eb5748b4d98f"
    };

    // Флаг для отслеживания ошибки подключения (если конфиг не валидный, работаем в офлайн-демо)
    let isFirebaseReady = false;
    let db = null;
    let app = null;

    // Пытаемся инициализировать Firebase, но если конфиг не настроен — используем localStorage fallback
    try {
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        isFirebaseReady = true;
        console.log("✅ Firebase подключён успешно");
    } catch (error) {
        console.warn("⚠️ Ошибка Firebase (неверный конфиг или отсутствует подключение):", error.message);
        console.warn("Переход в режим локального хранения (демо-данные сохраняются в браузере)");
        isFirebaseReady = false;
    }

    // ======================== ДЕМО-ДАННЫЕ (ПРИМЕРЫ ССЫЛОК) ========================
    // Образцы учебных ссылок — они будут добавлены в Firestore при первом запуске,
    // либо использованы как начальные данные для локального режима.
    const SAMPLE_LINKS = [
        { title: "Введение в HTML и CSS (бесплатный курс)", url: "https://developer.mozilla.org/ru/docs/Learn/HTML/Introduction_to_HTML", isCompleted: false },
        { title: "JavaScript: основы и лучшие практики", url: "https://learn.javascript.ru/", isCompleted: false },
        { title: "React для начинающих — официальный туториал", url: "https://react.dev/learn", isCompleted: false },
        { title: "Python: программирование для всех", url: "https://www.python.org/about/gettingstarted/", isCompleted: false },
        { title: "Базы данных и SQL (интерактивный тренажёр)", url: "https://www.sql-practice.com/", isCompleted: false },
        { title: "Алгоритмы и структуры данных (визуализация)", url: "https://visualgo.net/ru", isCompleted: false },
        { title: "Git и GitHub — курс для новичков", url: "https://learngitbranching.js.org/?locale=ru_RU", isCompleted: false },
        { title: "Английский для IT-специалистов (подкасты)", url: "https://www.english4it.com/", isCompleted: false }
    ];

    // Глобальная ссылка на тело таблицы
    const tableBody = document.getElementById('links-table-body');
    const progressSpan = document.getElementById('progressStats');
    let currentLinksData = []; // храним { id, title, url, isCompleted }

    // Функция обновления счётчика прогресса
    function updateProgressUI() {
        if (!currentLinksData.length) {
            progressSpan.textContent = `0 / 0 завершено`;
            return;
        }
        const completedCount = currentLinksData.filter(item => item.isCompleted === true).length;
        progressSpan.textContent = `${completedCount} / ${currentLinksData.length} завершено`;
    }

    // Отрисовка таблицы на основе currentLinksData
    function renderTable() {
        if (!tableBody) return;
        tableBody.innerHTML = '';
        
        if (currentLinksData.length === 0) {
            const emptyRow = document.createElement('tr');
            emptyRow.className = 'empty-row';
            emptyRow.innerHTML = '<td colspan="2">📚 Нет ссылок. Добавьте материалы в Firebase или перезагрузите демо.</td>';
            tableBody.appendChild(emptyRow);
            updateProgressUI();
            return;
        }

        for (const link of currentLinksData) {
            const tr = document.createElement('tr');
            if (link.isCompleted) tr.classList.add('completed');
            
            // Ячейка чекбокса
            const tdCheck = document.createElement('td');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = link.isCompleted;
            // Обработчик изменения состояния
            checkbox.addEventListener('change', async (e) => {
                e.stopPropagation();
                const newStatus = checkbox.checked;
                // оптимистично обновляем локально
                link.isCompleted = newStatus;
                if (newStatus) {
                    tr.classList.add('completed');
                } else {
                    tr.classList.remove('completed');
                }
                updateProgressUI();
                
                // Сохраняем статус в БД (Firebase или localStorage)
                await saveStatusToStorage(link.id, newStatus);
            });
            tdCheck.appendChild(checkbox);
            
            // Ячейка ссылки
            const tdLink = document.createElement('td');
            const anchor = document.createElement('a');
            anchor.href = link.url;
            anchor.target = '_blank';
            anchor.rel = 'noopener noreferrer';
            anchor.textContent = link.title;
            tdLink.appendChild(anchor);
            
            tr.appendChild(tdCheck);
            tr.appendChild(tdLink);
            tableBody.appendChild(tr);
        }
        updateProgressUI();
    }

    // Функция сохранения статуса (Firestore или localStorage fallback)
    async function saveStatusToStorage(docId, isChecked) {
        if (isFirebaseReady && db) {
            try {
                const linkRef = doc(db, "links", docId);
                await updateDoc(linkRef, { isCompleted: isChecked });
                console.log(`✅ Статус обновлён в Firebase: ${docId} -> ${isChecked}`);
            } catch (err) {
                console.error("Ошибка обновления Firebase:", err);
                // fallback на localStorage если Firebase не отвечает
                saveToLocalStorageFallback(docId, isChecked);
            }
        } else {
            saveToLocalStorageFallback(docId, isChecked);
        }
    }

    // Локальное резервное сохранение (localStorage)
    function saveToLocalStorageFallback(docId, isChecked) {
        try {
            const stored = localStorage.getItem("study_plan_local");
            let localData = [];
            if (stored) localData = JSON.parse(stored);
            const index = localData.findIndex(item => item.id === docId);
            if (index !== -1) {
                localData[index].isCompleted = isChecked;
                // также обновляем currentLinksData синхронно
                const linkInCurrent = currentLinksData.find(l => l.id === docId);
                if (linkInCurrent) linkInCurrent.isCompleted = isChecked;
            }
            localStorage.setItem("study_plan_local", JSON.stringify(localData));
            console.log("💾 Статус сохранён в localStorage");
            // перерисовывать не нужно, так как уже обновлено локально, но прогресс обновлён
        } catch(e) { console.warn(e); }
    }

    // Загрузка данных из Firebase + инициализация примерами (если коллекция пуста)
    async function loadFromFirebaseAndInit() {
        if (!isFirebaseReady || !db) {
            // Работаем полностью из localStorage или демо-данных по умолчанию
            loadFromLocalStorageOrSample();
            return;
        }
        
        try {
            const querySnapshot = await getDocs(collection(db, "links"));
            const firestoreLinks = [];
            querySnapshot.forEach(docSnap => {
                const data = docSnap.data();
                firestoreLinks.push({
                    id: docSnap.id,
                    title: data.title || "Без названия",
                    url: data.url || "#",
                    isCompleted: data.isCompleted === true
                });
            });
            
            // Если в Firestore пусто — заполняем примерами
            if (firestoreLinks.length === 0) {
                console.log("📤 Коллекция 'links' пуста, добавляем образцы ссылок...");
                const linksCollection = collection(db, "links");
                for (const sample of SAMPLE_LINKS) {
                    const newDocRef = doc(linksCollection);
                    await setDoc(newDocRef, {
                        title: sample.title,
                        url: sample.url,
                        isCompleted: sample.isCompleted
                    });
                }
                // повторно загружаем после добавления
                const newSnapshot = await getDocs(collection(db, "links"));
                newSnapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    firestoreLinks.push({
                        id: docSnap.id,
                        title: data.title,
                        url: data.url,
                        isCompleted: data.isCompleted
                    });
                });
                // очищаем массив и наполняем заново
                firestoreLinks.length = 0;
                newSnapshot.forEach(docSnap => {
                    firestoreLinks.push({
                        id: docSnap.id,
                        title: docSnap.data().title,
                        url: docSnap.data().url,
                        isCompleted: docSnap.data().isCompleted
                    });
                });
            }
            
            if (firestoreLinks.length > 0) {
                currentLinksData = firestoreLinks;
                renderTable();
            } else {
                // на всякий случай, если всё ещё пусто
                currentLinksData = SAMPLE_LINKS.map((item, idx) => ({ ...item, id: `local_${idx}` }));
                renderTable();
            }
        } catch (error) {
            console.error("Ошибка загрузки из Firebase:", error);
            loadFromLocalStorageOrSample();
        }
    }
    
    // Локальный режим (если нет Firebase или ошибка)
    function loadFromLocalStorageOrSample() {
        const stored = localStorage.getItem("study_plan_local");
        let localPlan = [];
        if (stored) {
            try {
                localPlan = JSON.parse(stored);
                if (Array.isArray(localPlan) && localPlan.length > 0) {
                    currentLinksData = localPlan;
                    renderTable();
                    return;
                }
            } catch(e) { console.warn(e); }
        }
        
        // иначе создаём демо-данные с локальными ID
        currentLinksData = SAMPLE_LINKS.map((item, index) => ({
            ...item,
            id: `sample_${index}`,
        }));
        // сохраняем в localStorage для последующей синхронизации статусов
        const toStore = currentLinksData.map(item => ({
            id: item.id,
            title: item.title,
            url: item.url,
            isCompleted: item.isCompleted
        }));
        localStorage.setItem("study_plan_local", JSON.stringify(toStore));
        renderTable();
    }
    
    // Функция для сброса всех отметок (опция, если нужно снять все галки)
    async function resetAllCheckboxes() {
        if (confirm("Снять все отметки о выполнении? Все чекбоксы станут пустыми. Прогресс будет сброшен.")) {
            // обновляем локально
            for (let link of currentLinksData) {
                link.isCompleted = false;
            }
            renderTable(); // перерисуем таблицу
            
            // синхронизируем с хранилищем (Firebase или localStorage)
            if (isFirebaseReady && db) {
                try {
                    for (let link of currentLinksData) {
                        const linkRef = doc(db, "links", link.id);
                        await updateDoc(linkRef, { isCompleted: false });
                    }
                    console.log("✅ Все отметки сброшены в Firebase");
                } catch (err) {
                    console.error("Ошибка сброса в Firebase, сохраняем локально", err);
                    syncAllToLocalStorage();
                }
            } else {
                syncAllToLocalStorage();
            }
        }
    }
    
    function syncAllToLocalStorage() {
        const toStore = currentLinksData.map(link => ({
            id: link.id,
            title: link.title,
            url: link.url,
            isCompleted: link.isCompleted
        }));
        localStorage.setItem("study_plan_local", JSON.stringify(toStore));
        console.log("💾 Локальный сброс сохранён в localStorage");
    }
    
    // Если в режиме демо, показываем кнопку сброса (удобно)
    function checkAndSetupResetButton() {
        const resetBtn = document.getElementById('demoResetBtn');
        if (resetBtn) {
            resetBtn.style.display = 'inline-flex';
            resetBtn.addEventListener('click', resetAllCheckboxes);
        }
    }
    
    // Инициализация приложения
    async function init() {
        if (isFirebaseReady && db) {
            await loadFromFirebaseAndInit();
        } else {
            loadFromLocalStorageOrSample();
        }
        checkAndSetupResetButton();
        
        // Периодический счётчик для отображения синхронизации (необязательно)
        // дополнительный контроль — если firebase не используется, показываем статус в футере
        const footerDiv = document.querySelector('.footer-note');
        if (!isFirebaseReady && footerDiv) {
            const syncSpan = document.createElement('span');
            syncSpan.className = 'sync-status';
            syncSpan.innerHTML = '📀 Режим локального хранения (данные в браузере)';
            footerDiv.prepend(syncSpan);
        } else if (isFirebaseReady && footerDiv) {
            const syncSpan = document.createElement('span');
            syncSpan.className = 'sync-status';
            syncSpan.innerHTML = '☁️ Синхронизация с Firebase Cloud';
            footerDiv.prepend(syncSpan);
        }
    }
    
    init();
</script>
</body>
</html>
