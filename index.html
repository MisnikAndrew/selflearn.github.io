    let currentLinksData = [];
    let originalLinksData = [];

    // --- УТИЛИТЫ ---
    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.textContent = msg; t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    function getToday() { const d = new Date(); d.setHours(0,0,0,0); return d; }

    // --- СИНХРОНИЗАЦИЯ И ИСПРАВЛЕННАЯ ДЕДУПЛИКАЦИЯ ---
    async function resyncWithDeduplication() {
        showToast("🔍 Анализ дубликатов...");
        try {
            // 1. Получаем всё из Firebase
            const snap = await getDocs(collection(db, "links"));
            const fireDocs = [];
            snap.forEach(d => fireDocs.push({ id: d.id, ...d.data() }));

            // 2. Группируем документы по URL
            const urlGroups = new Map(); // URL -> { ids: [], isCompleted: bool }
            fireDocs.forEach(doc => {
                if (!urlGroups.has(doc.url)) {
                    urlGroups.set(doc.url, { ids: [], isCompleted: false });
                }
                const group = urlGroups.get(doc.url);
                group.ids.push(doc.id);
                if (doc.isCompleted) group.isCompleted = true; // Если хоть один дубль завершен, помечаем всю группу
            });

            // 3. Дедуплицируем сам SAMPLE_LINKS (на случай ошибок в исходном коде)
            const uniqueSamples = new Map();
            SAMPLE_LINKS.forEach(s => uniqueSamples.set(s.url, s));

            const batch = writeBatch(db);
            const processedUrls = new Set();
            let deletedCount = 0;
            let updatedCount = 0;
            let createdCount = 0;

            // 4. Основной цикл по эталонному списку
            for (const [url, sample] of uniqueSamples.entries()) {
                processedUrls.add(url);
                
                if (urlGroups.has(url)) {
                    const group = urlGroups.get(url);
                    const masterId = group.ids[0]; // Оставляем первый ID как основной
                    const duplicates = group.ids.slice(1); // Все остальные — в корзину

                    // Обновляем основной документ актуальными данными из Sample + объединенный статус
                    batch.update(doc(db, "links", masterId), {
                        title: sample.title,
                        deadline: sample.deadline,
                        isCompleted: group.isCompleted 
                    });
                    updatedCount++;

                    // Удаляем дубликаты
                    duplicates.forEach(dupId => {
                        batch.delete(doc(db, "links", dupId));
                        deletedCount++;
                    });
                } else {
                    // Если в базе нет такого URL — создаем
                    const newRef = doc(collection(db, "links"));
                    batch.set(newRef, {
                        ...sample
                    });
                    createdCount++;
                }
            }

            // 5. Удаляем то, чего нет в эталонном списке
            for (const [url, group] of urlGroups.entries()) {
                if (!processedUrls.has(url)) {
                    group.ids.forEach(id => {
                        batch.delete(doc(db, "links", id));
                        deletedCount++;
                    });
                }
            }

            await batch.commit();
            showToast(`✅ Готово! Удалено дублей: ${deletedCount}, Обновлено: ${updatedCount}, Создано: ${createdCount}`);
            loadData(); // Перезагружаем интерфейс

        } catch (e) {
            console.error(e);
            showToast("❌ Ошибка при синхронизации");
        }
    }

    // --- ОТОБРАЖЕНИЕ ---
    function renderTable() {
        const tbody = document.getElementById('links-table-body');
        tbody.innerHTML = '';
        
        currentLinksData.forEach(link => {
            const tr = document.createElement('tr');
            if (link.isCompleted) tr.className = 'completed-row';
            else {
                const dead = new Date(link.deadline);
                const today = getToday();
                if (dead < today) tr.className = 'danger-row';
                else if (dead.getTime() === today.getTime()) tr.className = 'today-deadline-row';
            }

            tr.innerHTML = `
                <td><input type="checkbox" ${link.isCompleted ? 'checked' : ''}></td>
                <td><a href="${link.url}" target="_blank">${link.title}</a></td>
                <td><span class="deadline-badge">${link.deadline || '—'}</span></td>
            `;

            tr.querySelector('input').onchange = async (e) => {
                link.isCompleted = e.target.checked;
                await updateDoc(doc(db, "links", link.id), { isCompleted: link.isCompleted });
                renderTable();
                updateStats();
            };
            tbody.appendChild(tr);
        });
        updateStats();
    }

    function updateStats() {
        const done = currentLinksData.filter(l => l.isCompleted).length;
        document.getElementById('progressStats').textContent = `${done} / ${currentLinksData.length} пройдено`;
    }

    async function loadData() {
        const snap = await getDocs(collection(db, "links"));
        const data = [];
        snap.forEach(d => data.push({ id: d.id, ...d.data() }));
        originalLinksData = [...data];
        currentLinksData = [...data];
        sortByDeadline();
    }

    function sortByDeadline() {
        currentLinksData.sort((a, b) => (a.deadline || '9999').localeCompare(b.deadline || '9999'));
        renderTable();
    }

    // Инициализация кнопок
    document.getElementById('resyncFirebaseBtn').onclick = () => {
        if (confirm("Выполнить дедупликацию? База будет очищена от повторов URL, прогресс сохранится.")) {
            resyncWithDeduplication();
        }
    };
    
    document.getElementById('sortByDeadlineBtn').onclick = sortByDeadline;
    document.getElementById('resetSortBtn').onclick = () => {
        currentLinksData = [...originalLinksData];
        renderTable();
    };

    loadData();
</script>
