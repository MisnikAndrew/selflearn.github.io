<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой план обучения — трекер прогресса с дедлайнами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .header {
            background: linear-gradient(135deg, #1e2a3a, #0f1724);
            padding: 1.8rem 2rem;
            color: white;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1:before {
            content: "📘";
            font-size: 1.9rem;
        }

        .sub {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stats-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem 1.2rem;
            background-color: #f8fafc;
            color: #1e293b;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
            transition: background 0.2s;
        }

        /* Цветовые стили для строк */
        tr.completed-row {
            background-color: #e6f7e6;  /* зелёный для пройденных */
        }
        tr.warning-row {
            background-color: #fff9c4;  /* жёлтый: дедлайн не наступил, но не пройдено */
        }
        tr.danger-row {
            background-color: #ffe6e5;  /* красный: дедлайн наступил и не пройдено */
        }
        /* Легкий ховер поверх цветов */
        tr:hover td {
            filter: brightness(0.97);
        }

        .completed-row a {
            text-decoration: line-through;
            color: #6c757d;
            opacity: 0.8;
        }

        a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }

        a:after {
            content: "↗";
            font-size: 0.8rem;
            opacity: 0.6;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #2b6e3c;
            transform: scale(1);
            margin-right: 4px;
        }

        .deadline-cell {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .deadline-badge {
            background: rgba(0,0,0,0.05);
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
        }
        .deadline-overdue {
            color: #c62828;
            font-weight: 600;
        }
        .deadline-soon {
            color: #b26a00;
        }

        .footer-note {
            background: #f1f5f9;
            padding: 0.8rem 1.5rem;
            font-size: 0.75rem;
            color: #334155;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: normal;
            background: #e6f0ff;
            padding: 4px 12px;
            border-radius: 50px;
            color: #1e40af;
        }

        .btn-reset {
            background: none;
            border: none;
            color: #4b5563;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.2s;
        }

        .btn-reset:hover {
            background: #e2e8f0;
            color: #0f1724;
        }

        @media (max-width: 700px) {
            .header h1 { font-size: 1.5rem; }
            th, td { padding: 0.8rem 0.8rem; }
            .header { padding: 1.2rem 1rem; }
            .deadline-cell { font-size: 0.75rem; white-space: normal; }
        }

        .empty-row td {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 2rem;
        }
        /* иконка для дедлайна */
        .deadline-icon {
            margin-right: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>План самообразования (Мисник Андрей)</h1>
        <div class="sub">
            <span>📌 Отмечайте пройденные материалы — прогресс сохраняется</span>
            <span class="stats-badge" id="progressStats">0 / 0 завершено</span>
        </div>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px">Статус</th>
                    <th>Название</th>
                    <th style="width: 170px">📅 Дедлайн</th>
                </tr>
            </thead>
            <tbody id="links-table-body">
                <tr class="empty-row"><td colspan="3">⏳ Загрузка учебных материалов...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="footer-note">
        <span>✅ Чекбокс = пройдено (зеленый фон). Желтый = не пройдено, дедлайн в будущем. Красный = не пройдено, дедлайн просрочен.</span>
        <button class="btn-reset" id="demoResetBtn" style="display: none;">🔄 Сбросить все отметки (демо)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ======================== КОНФИГУРАЦИЯ FIREBASE ========================
    const firebaseConfig = {
        apiKey: "AIzaSyBYmca3nKbyB0e3VpCvFJZ3KsDSz8a1nKs",
        authDomain: "selflearn-462ff.firebaseapp.com",
        projectId: "selflearn-462ff",
        storageBucket: "selflearn-462ff.appspot.com",
        messagingSenderId: "530046188190",
        appId: "1:530046188190:web:4f1f5ceb63eb5748b4d98f"
    };

    let isFirebaseReady = false;
    let db = null;
    let app = null;

    try {
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        isFirebaseReady = true;
        console.log("✅ Firebase подключён успешно");
    } catch (error) {
        console.warn("⚠️ Ошибка Firebase:", error.message);
        console.warn("Переход в режим локального хранения");
        isFirebaseReady = false;
    }

    // ======================== РАСШИРЕННЫЕ ДАННЫЕ С ДЕДЛАЙНАМИ ========================
    // Каждый элемент: title, url, isCompleted, deadline (строка в формате YYYY-MM-DD)
    const SAMPLE_LINKS = [
        { title: "Введение в HTML и CSS (бесплатный курс)", url: "https://developer.mozilla.org/ru/docs/Learn/HTML/Introduction_to_HTML", isCompleted: false, deadline: "2026-05-10" },
        { title: "JavaScript: основы и лучшие практики", url: "https://learn.javascript.ru/", isCompleted: false, deadline: "2026-06-01" },
        { title: "React для начинающих — официальный туториал", url: "https://react.dev/learn", isCompleted: false, deadline: "2026-07-15" },
        { title: "Python: программирование для всех", url: "https://www.python.org/about/gettingstarted/", isCompleted: false, deadline: "2026-05-20" },
        { title: "Базы данных и SQL (интерактивный тренажёр)", url: "https://www.sql-practice.com/", isCompleted: false, deadline: "2026-04-15" },  // просрочен (если сегодня после 15.04)
        { title: "Алгоритмы и структуры данных (визуализация)", url: "https://visualgo.net/ru", isCompleted: false, deadline: "2026-08-01" },
        { title: "Git и GitHub — курс для новичков", url: "https://learngitbranching.js.org/?locale=ru_RU", isCompleted: false, deadline: "2026-05-25" },
        { title: "Английский для IT-специалистов (подкасты)", url: "https://www.english4it.com/", isCompleted: false, deadline: "2026-06-30" }
    ];

    // Глобальное состояние
    let currentLinksData = []; // каждый объект: { id, title, url, isCompleted, deadline }
    const tableBody = document.getElementById('links-table-body');
    const progressSpan = document.getElementById('progressStats');

    // Вспомогательная функция: получить текущую дату без времени (сравнение только дат)
    function getTodayDate() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return today;
    }

    // Определение цвета строки по правилам:
    // - Если isCompleted === true -> зеленая (completed-row)
    // - Иначе если дедлайн ещё не наступил (deadline >= сегодня) -> желтая (warning-row)
    // - Иначе (deadline < сегодня) -> красная (danger-row)
    function getRowClass(link) {
        if (link.isCompleted) return 'completed-row';
        if (!link.deadline) return ''; // если нет дедлайна, без подсветки (нейтрально)
        const today = getTodayDate();
        const deadlineDate = new Date(link.deadline);
        deadlineDate.setHours(0, 0, 0, 0);
        if (deadlineDate >= today) {
            return 'warning-row';  // желтый: дедлайн в будущем или сегодня, но не пройдено
        } else {
            return 'danger-row';   // красный: просрочено и не пройдено
        }
    }

    // Форматирование дедлайна для отображения (более читаемый вид)
    function formatDeadline(deadlineStr) {
        if (!deadlineStr) return '—';
        const parts = deadlineStr.split('-');
        if (parts.length !== 3) return deadlineStr;
        const dateObj = new Date(deadlineStr);
        if (isNaN(dateObj.getTime())) return deadlineStr;
        return dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }).replace(' г.', '');
    }

    // Проверка, просрочен ли дедлайн (для дополнительной иконки)
    function isDeadlineOverdue(deadlineStr, isCompleted) {
        if (isCompleted) return false;
        if (!deadlineStr) return false;
        const today = getTodayDate();
        const deadlineDate = new Date(deadlineStr);
        deadlineDate.setHours(0, 0, 0, 0);
        return deadlineDate < today;
    }

    // Отрисовка таблицы с учетом цветов строк и дедлайнов
    function renderTable() {
        if (!tableBody) return;
        tableBody.innerHTML = '';

        if (currentLinksData.length === 0) {
            const emptyRow = document.createElement('tr');
            emptyRow.className = 'empty-row';
            emptyRow.innerHTML = '<td colspan="3">📚 Нет ссылок. Добавьте материалы в Firebase или перезагрузите демо.</td>';
            tableBody.appendChild(emptyRow);
            updateProgressUI();
            return;
        }

        for (const link of currentLinksData) {
            const tr = document.createElement('tr');
            const rowClass = getRowClass(link);
            if (rowClass) tr.classList.add(rowClass);

            // Ячейка чекбокса
            const tdCheck = document.createElement('td');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = link.isCompleted;
            checkbox.addEventListener('change', async (e) => {
                e.stopPropagation();
                const newStatus = checkbox.checked;
                // обновляем локальное состояние
                link.isCompleted = newStatus;
                // перерисовываем строку с новым классом (меняем цвет)
                renderTable();  // полная перерисовка для корректного изменения цвета
                // сохраняем статус в хранилище
                await saveStatusToStorage(link.id, newStatus);
            });
            tdCheck.appendChild(checkbox);

            // Ячейка ссылки (название + ссылка)
            const tdLink = document.createElement('td');
            const anchor = document.createElement('a');
            anchor.href = link.url;
            anchor.target = '_blank';
            anchor.rel = 'noopener noreferrer';
            anchor.textContent = link.title;
            tdLink.appendChild(anchor);

            // Ячейка дедлайна с дополнительным оформлением
            const tdDeadline = document.createElement('td');
            tdDeadline.className = 'deadline-cell';
            if (link.deadline) {
                const deadlineText = formatDeadline(link.deadline);
                const overdue = isDeadlineOverdue(link.deadline, link.isCompleted);
                const badgeSpan = document.createElement('span');
                badgeSpan.className = 'deadline-badge';
                const iconSpan = document.createElement('span');
                iconSpan.className = 'deadline-icon';
                iconSpan.textContent = overdue ? '⚠️ ' : '📅 ';
                badgeSpan.appendChild(iconSpan);
                const textSpan = document.createElement('span');
                textSpan.textContent = deadlineText;
                if (overdue && !link.isCompleted) {
                    textSpan.style.color = '#c62828';
                    textSpan.style.fontWeight = 'bold';
                } else if (!link.isCompleted && new Date(link.deadline) >= getTodayDate()) {
                    textSpan.style.color = '#b26a00';
                }
                badgeSpan.appendChild(textSpan);
                tdDeadline.appendChild(badgeSpan);
            } else {
                tdDeadline.textContent = '—';
                tdDeadline.style.opacity = '0.7';
            }

            tr.appendChild(tdCheck);
            tr.appendChild(tdLink);
            tr.appendChild(tdDeadline);
            tableBody.appendChild(tr);
        }
        updateProgressUI();
    }

    // Обновление счетчика прогресса
    function updateProgressUI() {
        if (!currentLinksData.length) {
            progressSpan.textContent = `0 / 0 завершено`;
            return;
        }
        const completedCount = currentLinksData.filter(item => item.isCompleted === true).length;
        progressSpan.textContent = `${completedCount} / ${currentLinksData.length} завершено`;
    }

    // Сохранение статуса в Firebase или localStorage
    async function saveStatusToStorage(docId, isChecked) {
        if (isFirebaseReady && db) {
            try {
                const linkRef = doc(db, "links", docId);
                await updateDoc(linkRef, { isCompleted: isChecked });
                console.log(`✅ Статус обновлён в Firebase: ${docId} -> ${isChecked}`);
            } catch (err) {
                console.error("Ошибка обновления Firebase:", err);
                saveToLocalStorageFallback(docId, isChecked);
            }
        } else {
            saveToLocalStorageFallback(docId, isChecked);
        }
    }

    function saveToLocalStorageFallback(docId, isChecked) {
        try {
            const stored = localStorage.getItem("study_plan_deadlines");
            let localData = [];
            if (stored) localData = JSON.parse(stored);
            const index = localData.findIndex(item => item.id === docId);
            if (index !== -1) {
                localData[index].isCompleted = isChecked;
                const linkInCurrent = currentLinksData.find(l => l.id === docId);
                if (linkInCurrent) linkInCurrent.isCompleted = isChecked;
            }
            localStorage.setItem("study_plan_deadlines", JSON.stringify(localData));
            console.log("💾 Статус сохранён в localStorage");
        } catch(e) { console.warn(e); }
    }

    // Загрузка данных из Firebase (с поддержкой полей deadline)
    async function loadFromFirebaseAndInit() {
        if (!isFirebaseReady || !db) {
            loadFromLocalStorageOrSample();
            return;
        }

        try {
            const querySnapshot = await getDocs(collection(db, "links"));
            let firestoreLinks = [];
            querySnapshot.forEach(docSnap => {
                const data = docSnap.data();
                firestoreLinks.push({
                    id: docSnap.id,
                    title: data.title || "Без названия",
                    url: data.url || "#",
                    isCompleted: data.isCompleted === true,
                    deadline: data.deadline || null   // поддержка дедлайна в Firestore
                });
            });

            // Если коллекция пуста — загружаем образцы с дедлайнами
            if (firestoreLinks.length === 0) {
                console.log("📤 Коллекция 'links' пуста, добавляем образцы ссылок с дедлайнами...");
                const linksCollection = collection(db, "links");
                for (const sample of SAMPLE_LINKS) {
                    const newDocRef = doc(linksCollection);
                    await setDoc(newDocRef, {
                        title: sample.title,
                        url: sample.url,
                        isCompleted: sample.isCompleted,
                        deadline: sample.deadline
                    });
                }
                // повторная загрузка
                const newSnapshot = await getDocs(collection(db, "links"));
                firestoreLinks = [];
                newSnapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    firestoreLinks.push({
                        id: docSnap.id,
                        title: data.title,
                        url: data.url,
                        isCompleted: data.isCompleted,
                        deadline: data.deadline || null
                    });
                });
            }

            if (firestoreLinks.length > 0) {
                currentLinksData = firestoreLinks;
                renderTable();
            } else {
                currentLinksData = SAMPLE_LINKS.map((item, idx) => ({ ...item, id: `local_${idx}` }));
                renderTable();
            }
        } catch (error) {
            console.error("Ошибка загрузки из Firebase:", error);
            loadFromLocalStorageOrSample();
        }
    }

    // Локальный режим (с сохранением дедлайнов)
    function loadFromLocalStorageOrSample() {
        const stored = localStorage.getItem("study_plan_deadlines");
        let localPlan = [];
        if (stored) {
            try {
                localPlan = JSON.parse(stored);
                if (Array.isArray(localPlan) && localPlan.length > 0) {
                    // Убедимся, что у каждого элемента есть поле deadline (миграция)
                    const validPlan = localPlan.map(item => ({
                        ...item,
                        deadline: item.deadline || null
                    }));
                    currentLinksData = validPlan;
                    renderTable();
                    return;
                }
            } catch(e) { console.warn(e); }
        }

        // Создаем демо-данные с дедлайнами (копия SAMPLE_LINKS)
        currentLinksData = SAMPLE_LINKS.map((item, index) => ({
            ...item,
            id: `sample_${index}`,
            deadline: item.deadline
        }));
        const toStore = currentLinksData.map(item => ({
            id: item.id,
            title: item.title,
            url: item.url,
            isCompleted: item.isCompleted,
            deadline: item.deadline
        }));
        localStorage.setItem("study_plan_deadlines", JSON.stringify(toStore));
        renderTable();
    }

    // Сброс всех чекбоксов (только isCompleted = false, дедлайны не меняются)
    async function resetAllCheckboxes() {
        if (confirm("Снять все отметки о выполнении? Все чекбоксы станут пустыми. Прогресс будет сброшен.")) {
            for (let link of currentLinksData) {
                link.isCompleted = false;
            }
            renderTable();

            if (isFirebaseReady && db) {
                try {
                    for (let link of currentLinksData) {
                        const linkRef = doc(db, "links", link.id);
                        await updateDoc(linkRef, { isCompleted: false });
                    }
                    console.log("✅ Все отметки сброшены в Firebase");
                } catch (err) {
                    console.error("Ошибка сброса в Firebase, сохраняем локально", err);
                    syncAllToLocalStorage();
                }
            } else {
                syncAllToLocalStorage();
            }
        }
    }

    function syncAllToLocalStorage() {
        const toStore = currentLinksData.map(link => ({
            id: link.id,
            title: link.title,
            url: link.url,
            isCompleted: link.isCompleted,
            deadline: link.deadline
        }));
        localStorage.setItem("study_plan_deadlines", JSON.stringify(toStore));
        console.log("💾 Локальный сброс сохранён в localStorage");
    }

    // Добавление кнопки сброса и индикатора режима
    function setupUIComponents() {
        const resetBtn = document.getElementById('demoResetBtn');
        if (resetBtn) {
            resetBtn.style.display = 'inline-flex';
            resetBtn.addEventListener('click', resetAllCheckboxes);
        }
        const footerDiv = document.querySelector('.footer-note');
        if (footerDiv) {
            const syncSpan = document.createElement('span');
            syncSpan.className = 'sync-status';
            if (isFirebaseReady && db) {
                syncSpan.innerHTML = '☁️ Синхронизация с Firebase Cloud (с дедлайнами)';
            } else {
                syncSpan.innerHTML = '📀 Локальное хранение (данные в браузере + дедлайны)';
            }
            // добавляем в начало футера, но не дублируем
            const existingSync = footerDiv.querySelector('.sync-status');
            if (!existingSync) {
                footerDiv.prepend(syncSpan);
            }
        }
    }

    // Инициализация приложения
    async function init() {
        if (isFirebaseReady && db) {
            await loadFromFirebaseAndInit();
        } else {
            loadFromLocalStorageOrSample();
        }
        setupUIComponents();
    }

    init();
</script>
</body>
</html>
